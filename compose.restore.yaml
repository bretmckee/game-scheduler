# Restore override: use with compose.yaml to restore a backup
#
# Usage:
#   docker compose -f compose.yaml -f compose.restore.yaml up --exit-code-from restore
#
# Requires:
#   RESTORE_SRC — full URL of the backup to restore (e.g. s3://bucket/slot-0.dump.gz or file:///var/lib/backups/slot-0.dump.gz)
#   BACKUP_S3_* vars only needed when RESTORE_SRC starts with s3://
#   All POSTGRES_* vars from the base env file

services:
  init:
    environment:
      INIT_ROLES_ONLY: "true"

  restore:
    image: ${IMAGE_REGISTRY:-}game-scheduler-backup:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-gamebot}-restore
    entrypoint: /usr/local/bin/restore-script.sh
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_DEST: ${BACKUP_DEST}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-east-1}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      RESTORE_SRC: ${RESTORE_SRC}
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"
